<!DOCTYPE html>

<html lang = "es-GT">

    <head>

        <meta charset = "utf-8">

        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <meta name = "theme-color" content = "#0E1833">
        <meta name = "author" content = "Roberto Monzón">
        <meta name = "color-scheme" content = "dark">

        <meta property = "og:locale" content = "es_GT">

        <title>Vibes Player</title>

        <link rel = "stylesheet" type = "text/css" href = "styles/base.css">

        <script type = "module" src = "../../dist/renderer/scripts/app.js" defer></script>

    </head>

    <body>

        <audio id = "audiocontroler"></audio>

        <main class = "container">

            <aside id = "menu">

                <h3>Vibes Player</h3>

                <nav id = "navbar">

                    <a class = "btns">Inicio</a>
                    <a class = "btns">Listas</a> 
                    <a class = "btns">Biblioteca</a> 
                    <a class = "btns">Ajustes</a>
                
                </nav>

            </aside>

            <aside id = "view-container">
                <article>
                    <p id = "name-song"></p>
                </article>
            </aside>

        </main>

        <footer>

            <section id = "play_controls">

                <section id = "top_controls">

                    <section id = "playback_controls">

                        <button>
                            <img src = "assets/icons/player-track-prev.svg" class = "footer_icons">
                        </button>

                        <button id = "play">
                            <img src = "assets/icons/player-play.svg" class = "footer_icons">
                        </button>

                        <button>
                            <img src = "assets/icons/player-track-next.svg" class = "footer_icons">
                        </button>

                    </section>

                    <section id = "volume_control">
                        <input type = "range" id = "volume" min = "0" max = "1" step = "0.01">
                    </section>

                </section>

                <input type = "range" id = "progress" min = "0" max = "100" value = "0">

            </section>

        </footer>

    </body>

</html>
